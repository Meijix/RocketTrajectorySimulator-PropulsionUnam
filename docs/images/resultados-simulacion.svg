<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" rx="8" fill="url(#bg3)"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="600" height="40" rx="8" fill="#0f3460"/>
  <rect x="0" y="20" width="600" height="20" fill="#0f3460"/>
  <circle cx="20" cy="20" r="6" fill="#e94560"/>
  <circle cx="38" cy="20" r="6" fill="#FFD700"/>
  <circle cx="56" cy="20" r="6" fill="#4ecca3"/>
  <text x="300" y="25" text-anchor="middle" font-family="Arial" font-size="14" fill="#ccc">Rocket-Sim UNAM - Resultados de Simulacion</text>
  <!-- Altitude plot -->
  <g transform="translate(40, 60)">
    <text x="120" y="10" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">Altitud vs Tiempo</text>
    <!-- Axes -->
    <line x1="30" y1="20" x2="30" y2="140" stroke="#556677" stroke-width="1"/>
    <line x1="30" y1="140" x2="240" y2="140" stroke="#556677" stroke-width="1"/>
    <text x="10" y="80" text-anchor="middle" font-family="Arial" font-size="9" fill="#8899aa" transform="rotate(-90, 10, 80)">h (m)</text>
    <text x="135" y="155" text-anchor="middle" font-family="Arial" font-size="9" fill="#8899aa">t (s)</text>
    <!-- Trajectory curve -->
    <path d="M30 140 Q80 130 100 100 Q120 60 140 35 Q155 28 160 30 Q180 50 200 80 Q220 120 240 140" fill="none" stroke="#4ecca3" stroke-width="2.5"/>
    <!-- Apogee marker -->
    <circle cx="155" cy="28" r="4" fill="#FFD700"/>
    <text x="165" y="25" font-family="Arial" font-size="9" fill="#FFD700">Apogeo: 3,200 m</text>
  </g>
  <!-- Velocity plot -->
  <g transform="translate(310, 60)">
    <text x="120" y="10" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">Velocidad vs Tiempo</text>
    <!-- Axes -->
    <line x1="30" y1="20" x2="30" y2="140" stroke="#556677" stroke-width="1"/>
    <line x1="30" y1="140" x2="240" y2="140" stroke="#556677" stroke-width="1"/>
    <text x="10" y="80" text-anchor="middle" font-family="Arial" font-size="9" fill="#8899aa" transform="rotate(-90, 10, 80)">v (m/s)</text>
    <text x="135" y="155" text-anchor="middle" font-family="Arial" font-size="9" fill="#8899aa">t (s)</text>
    <!-- Velocity curve -->
    <path d="M30 100 Q50 50 70 30 Q90 25 100 28 Q120 60 140 100 Q160 115 180 120 Q200 118 220 115 Q230 118 240 120" fill="none" stroke="#e94560" stroke-width="2.5"/>
    <text x="85" y="22" font-family="Arial" font-size="9" fill="#e94560">Vmax: 280 m/s</text>
  </g>
  <!-- Summary stats -->
  <g transform="translate(40, 240)">
    <rect x="0" y="0" width="520" height="120" rx="8" fill="#0f3460" opacity="0.5"/>
    <text x="260" y="25" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">Resumen del Vuelo</text>
    <text x="40" y="55" font-family="monospace" font-size="12" fill="#4ecca3">Apogeo: 3,200 m</text>
    <text x="40" y="80" font-family="monospace" font-size="12" fill="#4ecca3">Vel. maxima: 280 m/s</text>
    <text x="40" y="105" font-family="monospace" font-size="12" fill="#4ecca3">Mach max: 0.82</text>
    <text x="280" y="55" font-family="monospace" font-size="12" fill="#e94560">Tiempo vuelo: 45.2 s</text>
    <text x="280" y="80" font-family="monospace" font-size="12" fill="#e94560">Tiempo apogeo: 18.7 s</text>
    <text x="280" y="105" font-family="monospace" font-size="12" fill="#e94560">Dist. impacto: 150 m</text>
  </g>
  <!-- Footer -->
  <text x="300" y="385" text-anchor="middle" font-family="Arial" font-size="11" fill="#556677" font-style="italic">Captura de pantalla - Reemplazar con imagen real</text>
</svg>
