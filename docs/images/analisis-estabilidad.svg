<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" rx="8" fill="url(#bg2)"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="600" height="40" rx="8" fill="#0f3460"/>
  <rect x="0" y="20" width="600" height="20" fill="#0f3460"/>
  <circle cx="20" cy="20" r="6" fill="#e94560"/>
  <circle cx="38" cy="20" r="6" fill="#FFD700"/>
  <circle cx="56" cy="20" r="6" fill="#4ecca3"/>
  <text x="300" y="25" text-anchor="middle" font-family="Arial" font-size="14" fill="#ccc">Rocket-Sim UNAM - Analisis de Estabilidad</text>
  <!-- Rocket with CG/CP markers -->
  <g transform="translate(50, 100)">
    <!-- Rocket body horizontal -->
    <path d="M30 100 L60 80 L60 120 Z" fill="#e94560" stroke="#fff" stroke-width="1"/>
    <rect x="60" y="80" width="250" height="40" fill="#2d4059" stroke="#fff" stroke-width="1.5" rx="2"/>
    <path d="M310 75 L340 100 L310 125" fill="#e94560" stroke="#fff" stroke-width="1"/>
    <!-- CG marker -->
    <line x1="160" y1="60" x2="160" y2="130" stroke="#4ecca3" stroke-width="2" stroke-dasharray="5,3"/>
    <circle cx="160" cy="100" r="8" fill="#4ecca3" stroke="#fff" stroke-width="1.5"/>
    <text x="160" y="104" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1a1a2e">CG</text>
    <text x="160" y="50" text-anchor="middle" font-family="Arial" font-size="11" fill="#4ecca3">Centro de Gravedad</text>
    <!-- CP marker -->
    <line x1="230" y1="60" x2="230" y2="130" stroke="#e94560" stroke-width="2" stroke-dasharray="5,3"/>
    <circle cx="230" cy="100" r="8" fill="#e94560" stroke="#fff" stroke-width="1.5"/>
    <text x="230" y="104" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#fff">CP</text>
    <text x="230" y="50" text-anchor="middle" font-family="Arial" font-size="11" fill="#e94560">Centro de Presion</text>
    <!-- Stability margin arrow -->
    <line x1="160" y1="145" x2="230" y2="145" stroke="#FFD700" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="230" y1="145" x2="160" y2="145" stroke="#FFD700" stroke-width="2"/>
    <text x="195" y="165" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#FFD700">Margen Estatico</text>
  </g>
  <!-- Stats panel -->
  <g transform="translate(400, 70)">
    <text x="0" y="0" font-family="Arial" font-size="14" font-weight="bold" fill="#4ecca3">Resultados</text>
    <rect x="0" y="10" width="170" height="1" fill="#4ecca3" opacity="0.3"/>
    <text x="0" y="35" font-family="monospace" font-size="12" fill="#8899aa">CG: 0.92 m</text>
    <text x="0" y="60" font-family="monospace" font-size="12" fill="#8899aa">CP: 1.15 m</text>
    <text x="0" y="85" font-family="monospace" font-size="12" fill="#8899aa">Calibre: 0.102 m</text>
    <text x="0" y="115" font-family="monospace" font-size="14" font-weight="bold" fill="#4ecca3">Margen: 2.25 cal</text>
    <rect x="0" y="130" width="170" height="30" rx="6" fill="#4ecca3" opacity="0.2" stroke="#4ecca3" stroke-width="1"/>
    <text x="85" y="150" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#4ecca3">ESTABLE</text>
    <text x="0" y="190" font-family="Arial" font-size="10" fill="#8899aa">Rango ideal: 1.0 - 2.5 cal</text>
  </g>
  <!-- Footer -->
  <text x="300" y="380" text-anchor="middle" font-family="Arial" font-size="11" fill="#556677" font-style="italic">Captura de pantalla - Reemplazar con imagen real</text>
</svg>
