<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a23;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a4e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" rx="8" fill="url(#bg4)"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="600" height="40" rx="8" fill="#0f3460"/>
  <rect x="0" y="20" width="600" height="20" fill="#0f3460"/>
  <circle cx="20" cy="20" r="6" fill="#e94560"/>
  <circle cx="38" cy="20" r="6" fill="#FFD700"/>
  <circle cx="56" cy="20" r="6" fill="#4ecca3"/>
  <text x="300" y="25" text-anchor="middle" font-family="Arial" font-size="14" fill="#ccc">Rocket-Sim UNAM - Animacion 3D de Trayectoria</text>
  <!-- 3D viewport -->
  <rect x="30" y="55" width="540" height="310" rx="4" fill="url(#sky)" stroke="#334455" stroke-width="1"/>
  <!-- Grid lines (perspective) -->
  <g opacity="0.15" stroke="#4ecca3" stroke-width="0.5">
    <line x1="100" y1="350" x2="300" y2="250"/>
    <line x1="170" y1="350" x2="340" y2="250"/>
    <line x1="240" y1="350" x2="380" y2="250"/>
    <line x1="310" y1="350" x2="420" y2="250"/>
    <line x1="380" y1="350" x2="460" y2="250"/>
    <line x1="450" y1="350" x2="500" y2="250"/>
    <line x1="80" y1="290" x2="520" y2="290"/>
    <line x1="90" y1="310" x2="530" y2="310"/>
    <line x1="100" y1="330" x2="540" y2="330"/>
    <line x1="110" y1="350" x2="550" y2="350"/>
  </g>
  <!-- 3D trajectory path -->
  <path d="M200 340 Q180 310 170 280 Q160 240 180 200 Q200 150 250 110 Q300 80 340 75 Q370 78 380 90 Q400 120 410 160 Q420 200 430 250 Q435 280 440 310 Q443 330 445 350" fill="none" stroke="#4ecca3" stroke-width="3" opacity="0.8"/>
  <!-- Rocket at trajectory point -->
  <g transform="translate(335, 68) rotate(-10)">
    <path d="M0 -15 L5 0 L5 15 L3 20 L-3 20 L-5 15 L-5 0 Z" fill="#e94560" stroke="#fff" stroke-width="0.8"/>
    <path d="M-2 20 L0 28 L2 20" fill="#FFD700" opacity="0.8"/>
  </g>
  <!-- Apogee marker -->
  <circle cx="340" cy="75" r="5" fill="none" stroke="#FFD700" stroke-width="2"/>
  <text x="355" y="72" font-family="Arial" font-size="11" fill="#FFD700">Apogeo</text>
  <!-- Launch point -->
  <circle cx="200" cy="340" r="4" fill="#4ecca3"/>
  <text x="210" y="345" font-family="Arial" font-size="10" fill="#4ecca3">Lanzamiento</text>
  <!-- Impact point -->
  <circle cx="445" cy="350" r="4" fill="#e94560"/>
  <text x="455" y="345" font-family="Arial" font-size="10" fill="#e94560">Impacto</text>
  <!-- Axes labels -->
  <text x="50" y="200" font-family="Arial" font-size="11" fill="#8899aa" transform="rotate(-90, 50, 200)">Altitud (m)</text>
  <text x="300" y="365" text-anchor="middle" font-family="Arial" font-size="11" fill="#8899aa">Distancia (m)</text>
  <!-- Footer -->
  <text x="300" y="385" text-anchor="middle" font-family="Arial" font-size="11" fill="#556677" font-style="italic">Captura de pantalla - Reemplazar con imagen real</text>
</svg>
