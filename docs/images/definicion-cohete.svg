<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" rx="8" fill="url(#bg1)"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="600" height="40" rx="8" fill="#0f3460"/>
  <rect x="0" y="20" width="600" height="20" fill="#0f3460"/>
  <circle cx="20" cy="20" r="6" fill="#e94560"/>
  <circle cx="38" cy="20" r="6" fill="#FFD700"/>
  <circle cx="56" cy="20" r="6" fill="#4ecca3"/>
  <text x="300" y="25" text-anchor="middle" font-family="Arial" font-size="14" fill="#ccc">Rocket-Sim UNAM - Definicion del Cohete</text>
  <!-- Rocket schematic -->
  <g transform="translate(50, 80)">
    <!-- Nosecone -->
    <path d="M200 0 L230 60 L170 60 Z" fill="#e94560" stroke="#fff" stroke-width="1.5"/>
    <text x="200" y="45" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">Ojiva</text>
    <!-- Body tube -->
    <rect x="170" y="60" width="60" height="150" fill="#2d4059" stroke="#fff" stroke-width="1.5"/>
    <text x="200" y="140" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">Cuerpo</text>
    <!-- Fins -->
    <path d="M170 170 L140 230 L170 210 Z" fill="#e94560" stroke="#fff" stroke-width="1"/>
    <path d="M230 170 L260 230 L230 210 Z" fill="#e94560" stroke="#fff" stroke-width="1"/>
    <text x="130" y="215" text-anchor="middle" font-family="Arial" font-size="9" fill="#FFD700">Aletas</text>
    <!-- Motor -->
    <rect x="180" y="210" width="40" height="40" fill="#4ecca3" stroke="#fff" stroke-width="1"/>
    <text x="200" y="235" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a1a2e">Motor</text>
    <!-- Flame -->
    <path d="M185 250 L195 280 L200 265 L205 280 L215 250" fill="#FFD700" opacity="0.8"/>
  </g>
  <!-- Form fields -->
  <g transform="translate(330, 70)">
    <text x="0" y="0" font-family="Arial" font-size="14" font-weight="bold" fill="#4ecca3">Parametros del Cohete</text>
    <rect x="0" y="15" width="220" height="28" rx="4" fill="#0f3460" stroke="#4ecca3" stroke-width="0.5"/>
    <text x="10" y="34" font-family="monospace" font-size="11" fill="#8899aa">Masa total: 12.5 kg</text>
    <rect x="0" y="50" width="220" height="28" rx="4" fill="#0f3460" stroke="#4ecca3" stroke-width="0.5"/>
    <text x="10" y="69" font-family="monospace" font-size="11" fill="#8899aa">Longitud: 1.82 m</text>
    <rect x="0" y="85" width="220" height="28" rx="4" fill="#0f3460" stroke="#4ecca3" stroke-width="0.5"/>
    <text x="10" y="104" font-family="monospace" font-size="11" fill="#8899aa">Diametro: 0.102 m</text>
    <rect x="0" y="120" width="220" height="28" rx="4" fill="#0f3460" stroke="#4ecca3" stroke-width="0.5"/>
    <text x="10" y="139" font-family="monospace" font-size="11" fill="#8899aa">Cd: 0.45</text>
    <rect x="0" y="155" width="220" height="28" rx="4" fill="#0f3460" stroke="#4ecca3" stroke-width="0.5"/>
    <text x="10" y="174" font-family="monospace" font-size="11" fill="#8899aa">Empuje max: 1200 N</text>
    <rect x="0" y="200" width="220" height="35" rx="6" fill="#e94560"/>
    <text x="110" y="222" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#fff">Actualizar Cohete</text>
  </g>
  <!-- Footer note -->
  <text x="300" y="380" text-anchor="middle" font-family="Arial" font-size="11" fill="#556677" font-style="italic">Captura de pantalla - Reemplazar con imagen real</text>
</svg>
